# x-news-autoposter config
# Copy to config.toml and edit. CI/GitHub Actions reads this file directly.

[general]
# IANA timezone name. Used for "quiet hours".
timezone = "Asia/Kolkata"

# Hard cap on posts per UTC day, regardless of cadence.
max_posts_per_day = 6

# Local-time hours during which posting is allowed (inclusive start, exclusive end).
# Outside this window, run-once is a no-op. Default: 7am to 11pm local.
active_hours_start = 7
active_hours_end = 23

# Minimum minutes between posts. The scheduler will skip if the last post was too recent.
min_minutes_between_posts = 120

# Random jitter added to the gap (seconds) so posts don't land on the same minute every run.
jitter_seconds = 180

# If true, never actually post — just log what would be posted. Override per-invocation
# with --dry-run / --no-dry-run.
dry_run = true

[generator]
# Groq model. Free tier supports llama-3.3-70b-versatile, llama-3.1-8b-instant, etc.
model = "llama-3.3-70b-versatile"
temperature = 0.7
max_tokens = 200

# Persona / voice instructions baked into every prompt.
persona = """
You are a sharp, concise tech and geopolitics commentator on X.
Tone: informed, direct, slightly opinionated but not inflammatory. No emojis.
No hashtags. No "BREAKING:" prefixes. No clickbait.
Always include the source domain in plain text and the URL at the end.
"""

# Hard upper bound on tweet character count (X limit is 280).
max_tweet_chars = 275

[topics]
# Weighted topic mix. Numbers are sampled relatively.
tech = 1.0
geopolitics = 1.0

# Optional keyword filters applied to article titles (case-insensitive). Empty = no filter.
must_include_any = []
must_exclude_any = ["sponsored", "advertorial"]

